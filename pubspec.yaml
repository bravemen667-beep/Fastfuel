name: gofaster_health
description: GoFaster - Premium health & wellness performance tracking app.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase (locked versions — compatible with Flutter 3.35.4)
  firebase_core: 3.6.0
  firebase_auth: 5.3.1
  cloud_firestore: 5.4.3
  firebase_messaging: 15.1.3

  # State management
  provider: 6.1.5+1

  # Storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # Networking (Google Fitness REST API)
  http: 1.5.0

  # Google Sign-In (OAuth2 for Fitness API)
  google_sign_in: 6.2.2

  # Health Connect (Android) + HealthKit (iOS) — unified plugin
  health: 12.2.0

  # Permission handler for runtime permission requests
  permission_handler: 11.3.1

  # Notifications
  flutter_local_notifications: 18.0.1
  timezone: 0.9.4
  google_fonts: 6.2.1
  fl_chart: 0.66.2
  percent_indicator: 4.2.3
  animated_text_kit: 4.2.3
  smooth_page_indicator: 1.2.0+3
  lottie: 3.3.1
  flutter_animate: 4.5.2
  cupertino_icons: 1.0.8
  intl: 0.19.0

  # URL launcher + share sheet + in-app browser
  url_launcher: 6.3.1
  share_plus: 10.1.4
  webview_flutter: 4.13.0

  # Image capture / screenshot for share card
  screenshot: 3.0.0

  # Image picker for camera/gallery (Scan Food)
  image_picker: 1.1.2

  # Camera for food scanner live preview
  camera: 0.10.5+9

  # Barcode / QR scanning
  mobile_scanner: 5.2.3

  # FontAwesome icons for share screen
  font_awesome_flutter: 10.7.0

  # Secure token storage (replaces plain SharedPreferences for auth state)
  flutter_secure_storage: 9.2.2

  # Native splash screen (orange background, white bolt)
  flutter_native_splash: 2.4.1

  # In-app review prompt (triggers after 7 days of data)
  in_app_review: 2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0
  hive_generator: 2.0.1
  build_runner: 2.4.13
  flutter_launcher_icons: 0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/



flutter_native_splash:
  color: "#0D0D0D"
  color_dark: "#0D0D0D"
  image: assets/icons/app_icon.png
  android_12:
    color: "#0D0D0D"
    color_dark: "#0D0D0D"
    image: assets/icons/app_icon.png
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: false
